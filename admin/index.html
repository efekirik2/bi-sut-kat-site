<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bi Üst Kat — Menü Yönetimi</title>
  <!-- Netlify Identity: hub'daki (/personel.html) oturumu paylaşır, tekrar şifre sormaz -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Decap CMS (eski adı Netlify CMS) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- Menü düzenlerken sitedeki gibi görünen canlı önizleme -->
  <script>
  (function () {
    if (!window.CMS) return;
    var createClass = window.createClass, h = window.h;

    var previewCss = `
      body { background:#17110c; color:#f6ede2; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin:0; padding:1.3rem; line-height:1.5; }
      .prev-wrap { max-width: 660px; margin: 0 auto; }
      .sec { margin-bottom: 2.2rem; }
      .eyebrow { color:#e8952e; font-weight:600; letter-spacing:2px; font-size:.7rem; text-transform:uppercase; }
      .sec h2 { font-size:1.6rem; margin:.2rem 0 1.2rem; font-weight:800; }
      .sec h2::after { content:""; display:block; width:46px; height:3px; margin:.55rem 0 0; background:linear-gradient(90deg,#e8952e,#cf7f22); border-radius:3px; }
      .featured { display:grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap:1rem; }
      .dish { background:#2a2018; border:1px solid #3a2e24; border-radius:14px; overflow:hidden; }
      .dish .img-wrap img { width:100%; height:130px; object-fit:cover; display:block; }
      .dish .body { padding:.8rem .95rem 1rem; }
      .dish .body h3 { font-size:1.05rem; margin:0; }
      .dish .desc { color:#b6a591; font-size:.82rem; margin:.3rem 0 .65rem; }
      .dish .price { display:inline-block; color:#e8952e; font-weight:700; background:rgba(232,149,46,.12); border:1px solid rgba(232,149,46,.3); padding:.16rem .65rem; border-radius:999px; font-size:.85rem; }
      .menu-category { margin-bottom:1.7rem; }
      .menu-category > h3 { color:#e8952e; font-size:1.2rem; display:flex; align-items:center; gap:.6rem; margin:0 0 .85rem; }
      .menu-category > h3::before { content:"◆"; font-size:.7rem; color:#cf7f22; }
      .menu-category > h3::after { content:""; flex:1; height:1px; background:linear-gradient(90deg,#3a2e24,transparent); }
      .menu-item { display:flex; justify-content:space-between; align-items:baseline; gap:1rem; padding:.55rem 0; border-bottom:1px dashed #3a2e24; }
      .menu-item h4 { margin:0; font-size:.98rem; }
      .menu-item p { color:#b6a591; font-size:.82rem; margin:.12rem 0 0; }
      .menu-item .price { color:#e8952e; font-weight:700; white-space:nowrap; background:rgba(232,149,46,.12); border:1px solid rgba(232,149,46,.28); padding:.13rem .6rem; border-radius:999px; font-size:.82rem; }
      .prev-empty { color:#b6a591; font-style:italic; }
    `;
    try { CMS.registerPreviewStyle(previewCss, { raw: true }); } catch (e) {}

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }

    function build(data, assetUrl) {
      var featured = data.featured || [];
      var cats = data.categories || [];
      var f = featured.map(function (d) {
        var img = d.image ? assetUrl(d.image) : "";
        return '<div class="dish">' + (img ? '<div class="img-wrap"><img src="' + img + '"/></div>' : "") +
          '<div class="body"><h3>' + esc(d.name) + '</h3><p class="desc">' + esc(d.desc) +
          '</p><span class="price">' + esc(d.price) + "</span></div></div>";
      }).join("");
      var m = cats.map(function (c) {
        var items = (c.items || []).map(function (i) {
          return '<div class="menu-item"><div><h4>' + esc(i.name) + "</h4><p>" + esc(i.desc) +
            '</p></div><span class="price">' + esc(i.price) + "</span></div>";
        }).join("");
        return '<div class="menu-category"><h3>' + esc(c.title) + "</h3>" + items + "</div>";
      }).join("");
      return '<div class="prev-wrap">' +
        '<div class="sec"><span class="eyebrow">Şefin Önerileri</span><h2>Öne Çıkan Lezzetler</h2>' +
        '<div class="featured">' + (f || '<p class="prev-empty">Henüz öne çıkan lezzet yok.</p>') + "</div></div>" +
        '<div class="sec"><span class="eyebrow">Lezzetlerimiz</span><h2>Menü</h2>' +
        (m || '<p class="prev-empty">Henüz kategori yok.</p>') + "</div></div>";
    }

    try {
      CMS.registerPreviewTemplate("menu", createClass({
        render: function () {
          var self = this;
          var data;
          try { data = this.props.entry.getIn(["data"]).toJS(); } catch (e) { data = {}; }
          function assetUrl(p) {
            if (!p) return "";
            try {
              var a = self.props.getAsset(p);
              var u = a && (a.url || a.toString());
              if (u && u.indexOf("[object") === -1) return u;
            } catch (e) {}
            return "/" + String(p).replace(/^\//, "");
          }
          var html;
          try { html = build(data, assetUrl); }
          catch (e) { html = '<p style="color:#f6ede2;padding:1rem">Önizleme yüklenemedi.</p>'; }
          return h("div", { dangerouslySetInnerHTML: { __html: html } });
        }
      }));
    } catch (e) {}
  })();
  </script>
</body>
</html>
