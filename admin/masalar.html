<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bi Üst Kat — Masalar</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root {
      --bg: #17110c;
      --surface: #201812;
      --card: #2a2018;
      --accent: #e8952e;
      --accent-dark: #cf7f22;
      --text: #f6ede2;
      --muted: #b6a591;
      --line: #3a2e24;
      --danger: #d9534f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--line);
      position: sticky; top: 0; background: rgba(23,17,12,.95); z-index: 10;
    }
    header h1 { font-size: 1.3rem; color: var(--accent); }
    button {
      font: inherit; cursor: pointer; border: none; border-radius: 8px;
      padding: .55rem 1rem; font-weight: 600;
    }
    .btn-primary { background: var(--accent); color: #17110c; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-outline { background: transparent; border: 1px solid var(--line); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-small { padding: .35rem .7rem; font-size: .85rem; }

    #login-gate {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 70vh; gap: 1rem; text-align: center; padding: 2rem;
    }
    #login-gate p { color: var(--muted); }

    #app { display: none; padding: 1.5rem; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.25rem;
    }
    .table-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 1.1rem 1.25rem; display: flex; flex-direction: column;
    }
    .table-card h3 { font-size: 1.1rem; margin-bottom: .5rem; }
    .table-card .items { list-style: none; flex: 1; }
    .table-card .item-row {
      display: flex; justify-content: space-between; gap: .5rem; font-size: .88rem;
      padding: .35rem 0; border-bottom: 1px dashed var(--line);
    }
    .table-card .item-row .info { color: var(--text); }
    .table-card .item-row .info small { display: block; color: var(--muted); }
    .table-card .item-row .del {
      background: none; color: var(--muted); padding: 0 .3rem; font-size: 1rem;
    }
    .table-card .item-row .del:hover { color: var(--danger); }
    .table-card .empty { color: var(--muted); font-size: .85rem; padding: .5rem 0; }
    .table-card .total { font-weight: 700; color: var(--accent); margin: .6rem 0; }
    .table-card .actions { display: flex; gap: .5rem; }

    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
      align-items: center; justify-content: center; z-index: 30; padding: 1rem;
    }
    .overlay.open { display: flex; }
    .panel {
      background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
      max-width: 480px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 1.25rem 1.4rem;
    }
    .panel h2 { color: var(--accent); font-size: 1.15rem; margin-bottom: 1rem; }
    .panel .category h4 { color: var(--muted); font-size: .8rem; text-transform: uppercase; margin: 1rem 0 .4rem; }
    .menu-pick-row {
      display: flex; justify-content: space-between; align-items: center; gap: .5rem;
      padding: .5rem 0; border-bottom: 1px dashed var(--line);
    }
    .menu-pick-row .name { font-size: .92rem; }
    .menu-pick-row .price { color: var(--accent); font-size: .85rem; white-space: nowrap; }
    .menu-pick-row .add-controls { display: flex; align-items: center; gap: .4rem; }
    .menu-pick-row input[type="number"] {
      width: 3rem; background: var(--card); border: 1px solid var(--line); color: var(--text);
      border-radius: 6px; padding: .25rem; text-align: center;
    }
    .panel .close-row { display: flex; justify-content: flex-end; margin-top: 1rem; }
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--line); color: var(--text);
      padding: .7rem 1.2rem; border-radius: 8px; font-size: .9rem; z-index: 50;
      display: none;
    }
  </style>
</head>
<body>
  <div id="login-gate">
    <h1 style="color:var(--accent)">Bi Üst Kat — Masalar</h1>
    <p>Bu sayfa sadece personel içindir. Devam etmek için giriş yapın.</p>
    <button class="btn-primary" onclick="window.netlifyIdentity.open()">Giriş Yap</button>
  </div>

  <div id="app">
    <header>
      <h1>Masalar</h1>
      <div style="display:flex; gap:.6rem;">
        <button class="btn-outline" onclick="addTable()">+ Masa Ekle</button>
        <button class="btn-outline" onclick="window.netlifyIdentity.logout()">Çıkış</button>
      </div>
    </header>
    <div class="grid" id="grid"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2 id="panel-title">Masa</h2>
      <div id="panel-body"></div>
      <div class="close-row">
        <button class="btn-outline" onclick="closePanel()">Kapat</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    var API = "/.netlify/functions/";
    var menuCategories = [];
    var currentTableId = null;
    var pollTimer = null;
    // Sadece yerel geliştirmede (dev-server.js) Netlify Identity atlanır.
    var LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";

    function showToast(msg) {
      var t = document.getElementById("toast");
      t.textContent = msg;
      t.style.display = "block";
      setTimeout(function () { t.style.display = "none"; }, 2500);
    }

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
      });
    }

    function parsePrice(str) {
      var digits = String(str).replace(/[^\d]/g, "");
      return digits ? parseInt(digits, 10) : 0;
    }

    async function authHeaders() {
      if (LOCAL) return { "Content-Type": "application/json" };
      var user = window.netlifyIdentity.currentUser();
      var token = await user.jwt();
      return { Authorization: "Bearer " + token, "Content-Type": "application/json" };
    }

    async function loadMenu() {
      try {
        var res = await fetch("/content/menu.json", { cache: "no-store" });
        var data = await res.json();
        menuCategories = data.categories || [];
      } catch (e) {
        menuCategories = [];
      }
    }

    async function fetchTables() {
      try {
        var headers = await authHeaders();
        var res = await fetch(API + "tables", { headers: headers });
        if (!res.ok) throw new Error(await serverError(res, "Masalar yüklenemedi"));
        var tables = await res.json();
        renderGrid(tables);
      } catch (e) {
        console.error(e);
        showToast("Hata: " + e.message);
      }
    }

    function renderGrid(tables) {
      var grid = document.getElementById("grid");
      grid.innerHTML = tables.map(function (t) {
        var itemsHtml = (t.items || []).length
          ? t.items.map(function (i) {
              return '<li class="item-row"><span class="info">' + i.quantity + "x " + esc(i.name) +
                (i.note ? "<small>" + esc(i.note) + "</small>" : "") +
                '</span><button class="del" onclick="removeItem(\'' + i.id + '\')">✕</button></li>';
            }).join("")
          : '<li class="empty">Sipariş yok</li>';
        return '<div class="table-card">' +
          "<h3>" + esc(t.name) + "</h3>" +
          '<ul class="items">' + itemsHtml + "</ul>" +
          '<div class="total">Toplam: ₺' + t.total + "</div>" +
          '<div class="actions">' +
          '<button class="btn-primary btn-small" onclick="openPanel(\'' + t.id + '\', \'' + esc(t.name).replace(/'/g, "\\'") + '\')">Sipariş Ekle</button>' +
          (t.order_id ? '<button class="btn-danger btn-small" onclick="closeBill(\'' + t.id + '\')">Hesabı Kapat</button>' : "") +
          '<button class="btn-outline btn-small" onclick="deleteTable(\'' + t.id + '\', \'' + esc(t.name).replace(/'/g, "\\'") + '\')">Sil</button>' +
          "</div>" +
          "</div>";
      }).join("");
    }

    function openPanel(tableId, tableName) {
      currentTableId = tableId;
      document.getElementById("panel-title").textContent = tableName + " — Sipariş Ekle";
      var body = document.getElementById("panel-body");
      body.innerHTML = menuCategories.map(function (cat, ci) {
        var rows = (cat.items || []).map(function (item, ii) {
          var id = "qty_" + ci + "_" + ii;
          return '<div class="menu-pick-row">' +
            '<span class="name">' + esc(item.name) + "</span>" +
            '<span class="price">' + esc(item.price) + "</span>" +
            '<span class="add-controls">' +
            '<input type="number" id="' + id + '" value="1" min="1" />' +
            '<button class="btn-primary btn-small add-btn" data-name="' + esc(item.name) +
              '" data-price="' + parsePrice(item.price) + '" data-qtyid="' + id + '">Ekle</button>' +
            "</span></div>";
        }).join("");
        return '<div class="category"><h4>' + esc(cat.title) + "</h4>" + rows + "</div>";
      }).join("");
      document.getElementById("overlay").classList.add("open");
    }

    document.getElementById("panel-body").addEventListener("click", function (e) {
      var btn = e.target.closest(".add-btn");
      if (!btn) return;
      addItem(btn.dataset.name, Number(btn.dataset.price), btn.dataset.qtyid);
    });

    function closePanel() {
      document.getElementById("overlay").classList.remove("open");
      currentTableId = null;
    }

    async function addItem(name, price, qtyInputId) {
      var qty = parseInt(document.getElementById(qtyInputId).value, 10) || 1;
      try {
        var headers = await authHeaders();
        var res = await fetch(API + "order-items", {
          method: "POST",
          headers: headers,
          body: JSON.stringify({ table_id: currentTableId, name: name, price: price, quantity: qty }),
        });
        if (!res.ok) throw new Error(await serverError(res, "Ürün eklenemedi"));
        showToast(name + " eklendi");
        fetchTables();
      } catch (e) {
        showToast("Hata: " + e.message);
      }
    }

    async function removeItem(itemId) {
      if (!confirm("Bu satırı silmek istediğinize emin misiniz?")) return;
      try {
        var headers = await authHeaders();
        var res = await fetch(API + "order-items?id=" + encodeURIComponent(itemId), {
          method: "DELETE",
          headers: headers,
        });
        if (!res.ok) throw new Error(await serverError(res, "Satır silinemedi"));
        fetchTables();
      } catch (e) {
        showToast("Hata: " + e.message);
      }
    }

    async function closeBill(tableId) {
      if (!confirm("Bu masanın hesabını kapatmak istediğinize emin misiniz?")) return;
      try {
        var headers = await authHeaders();
        var res = await fetch(API + "order-close", {
          method: "POST",
          headers: headers,
          body: JSON.stringify({ table_id: tableId }),
        });
        if (!res.ok) throw new Error(await serverError(res, "Hesap kapatılamadı"));
        var data = await res.json();
        showToast("Hesap kapatıldı: ₺" + data.total);
        fetchTables();
      } catch (e) {
        showToast("Hata: " + e.message);
      }
    }

    async function serverError(res, fallback) {
      try {
        var data = await res.json();
        return (data && data.error) ? data.error : fallback + " (" + res.status + ")";
      } catch (e) {
        return fallback + " (" + res.status + ")";
      }
    }

    async function deleteTable(tableId, tableName) {
      if (!confirm('"' + tableName + '" masasını tamamen silmek istediğinize emin misiniz?\nAçık sipariş varsa o da silinir.')) return;
      try {
        var headers = await authHeaders();
        var res = await fetch(API + "tables?id=" + encodeURIComponent(tableId), {
          method: "DELETE",
          headers: headers,
        });
        if (!res.ok) throw new Error(await serverError(res, "Masa silinemedi"));
        showToast(tableName + " silindi");
        fetchTables();
      } catch (e) {
        showToast("Hata: " + e.message);
      }
    }

    async function addTable() {
      var name = prompt("Yeni masa adı (örn. Masa 7):");
      if (!name || !name.trim()) return;
      try {
        var headers = await authHeaders();
        var res = await fetch(API + "tables", {
          method: "POST",
          headers: headers,
          body: JSON.stringify({ name: name.trim() }),
        });
        if (!res.ok) throw new Error(await serverError(res, "Masa eklenemedi"));
        fetchTables();
      } catch (e) {
        showToast("Hata: " + e.message);
      }
    }

    function startApp() {
      document.getElementById("login-gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      loadMenu().then(fetchTables);
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(fetchTables, 5000);
    }

    if (LOCAL) {
      // Yerel geliştirme: Identity yok, doğrudan uygulamayı başlat.
      startApp();
    } else {
      window.netlifyIdentity.on("init", function (user) {
        if (user) startApp();
      });
      window.netlifyIdentity.on("login", function () {
        window.netlifyIdentity.close();
        startApp();
      });
      window.netlifyIdentity.on("logout", function () {
        document.getElementById("app").style.display = "none";
        document.getElementById("login-gate").style.display = "flex";
        if (pollTimer) clearInterval(pollTimer);
      });
      window.netlifyIdentity.init();
    }
  </script>
</body>
</html>
